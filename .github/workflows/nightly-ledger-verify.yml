name: Nightly ledger integrity check

on:
  schedule:
    - cron: "0 9 * * *"  # 09:00 UTC daily
  workflow_dispatch: {}   # allow manual runs

jobs:
  verify-ledger:
    runs-on: ubuntu-latest
    if: ${{ vars.OBSV_LEDGER_PROJECTS != '' }}  # no-op until configured -- see below
    strategy:
      matrix:
        project: ${{ fromJson(vars.OBSV_LEDGER_PROJECTS || '[]') }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install obsvagent
        run: pip install -e ".[db]"

      # Requires repo/org secret OBSV_APP_DATABASE_URL (obsv_app's connection
      # string, generated by scripts/apply_migrations.py) and a repo/org
      # variable OBSV_LEDGER_PROJECTS -- a JSON array of project names to
      # check, e.g. '["treasury_orchestrator", "riskguard_assessment"]'.
      # Neither is set by default; this workflow is a no-op until an operator
      # configures them in the repo's Settings -> Secrets and variables.
      - name: Verify ledger for ${{ matrix.project }}
        env:
          OBSV_APP_DATABASE_URL: ${{ secrets.OBSV_APP_DATABASE_URL }}
        run: verify-ledger --project "${{ matrix.project }}"
