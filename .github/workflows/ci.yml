name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[otel,checker,db,alerting,dev]"

      - name: Lint
        run: ruff check obsvagent tests

      - name: Type check
        run: mypy obsvagent

      - name: Run tests
        run: pytest
